name: ppp
description: Project Planning & Performance
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.3.0+1

environment:
  sdk: ">=2.7.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  aad_oauth: ^0.2.0
  cupertino_icons: ^1.0.0
  google_sign_in: ^4.5.6
  html: ^0.14.0+4
  http: ^0.12.2
  provider: ^4.3.2+3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
